<!DOCTYPE html>
<html>
<head>
    <title>Live Raid Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: none;
        }

        .message {
            margin-bottom: 8px;
        }

        .name {
            color: #00bfff;
            font-weight: bold;
        }

        .time {
            font-size: 10px;
            color: gray;
            margin-left: 5px;
        }

        #input-area {
            display: none;
            padding: 8px;
            background: #1a1a1a;
        }

        input {
            flex: 1;
            padding: 10px;
            margin-right: 5px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: #00bfff;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        #name-screen {
            margin: auto;
            text-align: center;
        }

        #name-screen input {
            width: 200px;
            margin-top: 10px;
        }
        #video-wrapper {
            display: flex;
            justify-content: center;
            background: black;
            padding: 10px 0;
        }

        .video-container {
            width: 100%;
            max-width: 800px;   /* prevents stretching on PC */
            aspect-ratio: 16 / 9;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        .glow-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            color: #00ffff;
            text-shadow:
                0 0 5px #00ffff,
                0 0 10px #00ffff,
                0 0 20px #00bfff,
                0 0 40px #00bfff;
        }

        .sub-title {
            text-align: center;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="name-screen">
    <h2>Enter Your Name</h2>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br><br>
    <button onclick="saveName()">Join Chat</button>
</div>
<div style="padding:15px; background:#0f0f0f;">
    <div class="sub-title">Live Chat Room</div>
</div>
<div id="video-wrapper">
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>
</div>

<div id="chat-box"></div>

<div id="input-area">
    <input type="text" id="message" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
let name = localStorage.getItem("chatName");

function saveName() {
    let input = document.getElementById("nameInput").value.trim();
    if (input === "") return;

    localStorage.setItem("chatName", input);
    name = input;
    startChat();
}

function startChat() {
    document.getElementById("name-screen").style.display = "none";
    document.getElementById("chat-box").style.display = "block";
    document.getElementById("input-area").style.display = "flex";
    loadMessages();
}

function loadMessages() {
    fetch('/get_messages')
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("chat-box");
        box.innerHTML = "";
        data.reverse().slice(0, 100).forEach(msg => {
            box.innerHTML += `
                <div class="message">
                    <span class="name">${msg[0]}</span>
                    <span class="time">${msg[2]}</span><br>
                    ${msg[1]}
                </div>
            `;
        });
        box.scrollTop = box.scrollHeight;
    });
}

function sendMessage() {
    let messageInput = document.getElementById("message");
    let message = messageInput.value.trim();

    if (message === "") return;

    fetch('/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `name=${encodeURIComponent(name)}&message=${encodeURIComponent(message)}`
    }).then(() => {
        loadMessages();   // instant refresh for sender
    });

    messageInput.value = "";
}

document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

if (name) {
    startChat();
}

// 🔥 AUTO REFRESH EVERY 1 SECOND
setInterval(function() {
    if (name) {
        loadMessages();
    }
}, 1000);
</script>

</body>
</html>
